# Shared setup for all Little Buddy workflows.
# Handles Node.js install (with node_modules cache) and Prisma client generation.
#
# IMPORTANT: The calling job must run `actions/checkout@v4` BEFORE using
# this composite action, because GitHub needs the repo checked out to
# find local action definitions.

name: Setup Environment
description: Install deps with caching and generate Prisma client

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22

    # Cache node_modules directly — much faster than npm cache alone.
    - name: Cache node_modules
      id: cache-deps
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

    - name: Install dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci

    # Cache generated Prisma client — deterministic based on schema
    - name: Cache Prisma client
      id: cache-prisma
      uses: actions/cache@v4
      with:
        path: node_modules/.prisma
        key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

    - name: Generate Prisma client
      if: steps.cache-prisma.outputs.cache-hit != 'true'
      shell: bash
      run: npx prisma generate
